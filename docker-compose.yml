services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # CORS: allow all origins so no configuration needed
      - ALLOWED_ORIGINS=*
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Point the frontend at the backend on the same machine
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
